
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register - RokartZone</title>

<style>


  .container {
    border:  2px solid grey;
    display: flex;
   margin-top: 25%;
   margin-left: 50%;
   transform: translate(-50%,-50%);
    
  }

  /* Left Image */
  .left {
    /* border:  2px soild blue; */
    height: 400px;
    width: 300px;
    margin: 10px;
  
   
   
  }
  .left img{
    /* border:  2px solid green; */
    height: 100%;
    width: 100%;
  }

  /* Right Form */
  .right {
    /* border:  2px solid black; */
    display: flex;
    justify-content: center;
    align-items: center;
    background: #fff;
    margin: 10px;
    margin-left: 10px;
  }

  .form-box {
    width: 320px;
  }

  h2 {
    text-align: center;
    color: #00bcd4;
  }

  input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border: 1px solid #ccc;
    border-radius: 5px;
  }

  button {
    width: 100%;
    padding: 10px;
    background: #00bcd4;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
  }

  button:hover {
    background: #0097a7;
  }

  .otp-btn {
    background: #555;
    margin-top: 5px;
  }

  .otp-btn:hover {
    background: #333;
  }
  .login_font_size a{
     color: #2874f0;
      text-decoration: none;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .container {
      flex-direction: column;
    }

    .left {
      width: 100%;
      height: 200px;
    }

    .right {
      width: 100%;
      padding: 20px;
    }
  }
  
</style>
</head>

<body>

<div class="container">

  <!-- Left Image -->
  <div class="left">
      <img src="/static/STORE/register_image.PNG" >
  </div>

  <!-- Right Form -->
  <div class="right">
    <form class="form-box" action="/set_password" method="POST">
      {% csrf_token %}
<input type="text" name="email" value="{{emm}}">
      <h2>Enter OTP For New Account</h2>

     
       <input type="text" name="set_password" placeholder="Enter Your Password" required style="box-sizing: border-box;">
     
      <!-- OTP send (backend handle karega) -->
      <button type="submit"class="otp-btn">Save password</button>
      <p class="login_font_size">i have an already account? <a href="/login">Login</a></p>
    </form>
    
       
      
  </div>

</div>

</body>
</html>
