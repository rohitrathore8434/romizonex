{% extends "base.html" %}
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {% block title %}fitness{% endblock title %}
  {% block style %}
  <style>
.blog-header p {
  color: gray;
}
.blog-header {
  text-align: center;
  margin-bottom: 20px;
}
.blog-header h1 {
  font-size: 32px;
}
.blog-filters {
  text-align: center;
  margin-bottom: 20px;
}
.blog-filters button {
  padding: 8px 14px;
  margin: 5px;
  border: none;
  background: #eee;
  border-radius: 20px;
  cursor: pointer;
}
.blog-filters button:hover {
  background: #ddd;
}
/* ------------------------fitness----------------------------------------- */
/* Container */
.blog-container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}


/* Grid */
.blog-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
}

/* Card */
.blog-card {
  background: white;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  transition: 0.3s;
  /* border: 2px solid red; */
  height: 236px;
  width: 400px;
  display: flex;
  margin-left: 20px;
  margin-top: 50px;
}
.fitness_div{
    /* border: 2px solid blue; */
    height: 200px;
    width: 300px;
    margin-top: 18px;
    border-radius: 25px;
    margin-left: 10px;

}
.fitness_div img{
    height: 100%;
    width: 100%;
    border-radius: 20px;
   
}


.blog-card:hover {
  transform: translateY(-5px);
}

.blog-card img {
  width: 100%;
}

/* Content */
.blog-content {
  padding: 15px;
  /* border: 1px solid blue; */
  height: 200px;
  width: 360px;
  position: relative;
}

.blog-content h3 {
  font-size: 18px;
  margin: 10px 0;
}

.blog-content p {
  font-size: 14px;
  color: gray;
}

/* Category Tag */
.category {
  padding: 5px 10px;
  font-size: 12px;
  border-radius: 20px;
  color: white;
}


.category.fitness {
  background: red;
}


/* Button */
.read-btn {
  display: inline-block;
  margin-top: 10px;
  padding: 8px 12px;
  background: black;
  color: white;
  text-decoration: none;
  border-radius: 8px;
}
.read-btn:hover{
  background-color: blue;


}
.exct_all_ft{
  display: flex;
  flex-wrap: wrap;
  margin-top: 210px;
  margin-left: 35px;
}
.read_div{
  /* border: 1px solid red; */
  position: absolute;
  height: 70px;
  top:75%;
}
.filter_baar{
    position: fixed;
  top: 60px; 
  z-index: 14;
  background: white;
  width: 100%;

}


/* ====================================media============================== */

@media(max-width:580px){
  .filter_baar{
    margin-top: 65px;
    z-index: 12;
    /* border: 1px solid red; */
   
    height: 110px;
  }
.blog-header p {
  color: gray;
  font-size: 14px;
  margin-top: -5px;
}
.blog-header {
  text-align: center;
  margin-bottom: 5px;
  margin-top: -14px;
}
.blog-header h1 {
  font-size: 22px;
}
.blog-filters {
  text-align: center;
  margin-top: -6px;
}
.blog-filters button{
  font-size: 13px;

}
.blog-filters button {
  padding: 4px 7px;
  margin: 5px;
  border: none;
  background: #eee;
  border-radius: 10px;
  cursor: pointer;
  
}
.blog-filters button:hover {
  background: #ddd;
}

  /* ------------------------------------------- */
  .blog-card{
    width: 105px;
    background: white;
    /* height: 100px; */
    /* border: 1px solid red; */
    margin: 5px;
    margin-top: 20px;
    position: relative;
  display: flex;
  }

  .fitness_div{
    height: 80px;
    width: 80px;
    /* border: 1px solid blue; */
    margin-top: 20px;
    position: absolute;
    border-radius: 5px;
  }
    .fitness_div img{
    height: 100%;
    width: 100%;
    border-radius: 5px;
   }

  .blog-content{
    
  }

  .blog-content h3{
    font-size: 12px;
  }

  .blog-content p{
    font-size: 10px;
  }

.read-btn {

  
  padding: 2px 3px;
  background: black;
  color: white;
  text-decoration: none;
  font-size: 12px;
  border-radius: 4px; 

}
.read_div{
  position: absolute;
top: 199px;
right: 25px;
  
}

  .category{
    font-size: 10px;
    margin-top: -20px;
    /* border: 1px solid red; */
    position: absolute;
    margin-left: -20px;
   
  }
  /* .exct_all_ffn{
  margin-top: 68px;
  margin-left: -30px;
} */
.blog-content h3{
  font-size: 11px;
  margin-top:92px;
  width: 92px;
  height: 100px;
  margin-left: -10px;
  /* border: 1px solid red; */
  text-align: center;
  position: absolute;
  
}
.blog-content p{
  font-size: 8px;
  margin-top: 155px;
  width: 92px;
  height: 40px;
  margin-left: -10px;
  /* border: 1px solid red; */
  text-align: center;


}
a{
  text-decoration: none;
  color: black;
}
.exct_all_ft{
  margin-top: 68px;
  margin-left: 10px;
}

}


  </style>
  {% endblock style %}
</head>
<body>
    
{% block body %}
<div class="filter_baar">
  <div class="blog-header">
      <h1>✍️ Latest Blogs</h1>
      <p>Fitness • Funny • News • Daily Updates</p>
    </div>

    <!-- 🎯 CATEGORY FILTER -->
    <div class="blog-filters">
      <a href="/blogs"><button>All</button></a>
    <a href="/fitness"><button style="background-color: black;color: white;">Fitness 💪</button></a>
    <a href="/funny"><button>Funny 😂</button></a>
    <a href="/news"><button>News 📰</button></a>
    </div>
</div>
  <!-- -------------------------------------FITNESS----------------------------------------------- -->
<div class="exct_all_ft">
  {% for i in fness %}
  <div class="blog-card">

    <div class="fitness_div">
      <img src="{{i.image.url}}">
    </div>

    <div class="blog-content">

      <span class="category fitness">Fitness</span>
      <h3>{{i.title}}</h3>
      <p>{{i.decription}}</p>
        <div class="read_div">
          <a href="{% url 'blog_fitness' i.id %}" class="read-btn">Read More</a>
      </div>
    </div>

  </div>
  {% endfor %}
</div>

</html>
